services:
  - type: web
    name: calorie-calculator-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "43200"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      # Cross-origin cookie flags. Frontend (Vercel) and backend (Render) live
      # on different domains, so the refresh cookie MUST be SameSite=None+Secure
      # for browsers to send it on /auth/refresh requests.
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: "none"
      - key: CORS_ORIGINS
        sync: false          # set to your Vercel URL after deploy (e.g. https://calorie-calculato.vercel.app)
      - key: OPENAI_API_KEY
        sync: false          # optional
      - key: PYTHON_VERSION
        value: "3.11"
