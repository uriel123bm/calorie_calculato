# Deploy to Vercel Production on version tag push.
#
# Usage:
#   git tag v3.1.2 && git push origin v3.1.2
#
# That's it — Vercel deploys automatically.
# Regular `git push` to main does NOT trigger a deploy.
#
# Prerequisites (one-time setup in GitHub repo Settings → Secrets → Actions):
#   VERCEL_TOKEN        https://vercel.com/account/tokens
#   VERCEL_ORG_ID       Vercel Team/Account ID
#   VERCEL_PROJECT_ID   Vercel Project ID (Settings → General)

name: Vercel Production Deploy

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    tags:
      - "v*"

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (required for FastAPI backend build)
        uses: astral-sh/setup-uv@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
