# Production deploy via Vercel CLI (when Git→Vercel auto-deploy is unreliable).
# Setup: GitHub repo → Settings → Secrets → Actions → add:
#   VERCEL_TOKEN        https://vercel.com/account/tokens
#   VERCEL_ORG_ID       Project Settings → General (or .vercel/project.json after `vercel link`)
#   VERCEL_PROJECT_ID   same
# Then: Actions → "Vercel Production Deploy" → Run workflow.
# Ref: https://vercel.com/guides/how-can-i-use-github-actions-with-vercel

name: Vercel Production Deploy

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
