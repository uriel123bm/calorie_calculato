<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- רקע עומק + חיים -->
    <linearGradient id="bg" x1="56" y1="40" x2="456" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#02170f"/>
      <stop offset="0.35" stop-color="#0a3d28"/>
      <stop offset="0.65" stop-color="#146b45"/>
      <stop offset="100%" stop-color="#3daf72"/>
    </linearGradient>
    <radialGradient id="bloom" cx="78%" cy="22%" r="58%">
      <stop offset="0%" stop-color="#e8fff2" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#7dffb3" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floor" cx="50%" cy="92%" r="55%">
      <stop offset="0%" stop-color="#063822" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#02170f" stop-opacity="0"/>
    </radialGradient>
    <!-- עלה מרכזי — זוהר -->
    <linearGradient id="leaf" x1="256" y1="118" x2="256" y2="398" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#e6fff1"/>
      <stop offset="0.72" stop-color="#9fe8b8"/>
      <stop offset="100%" stop-color="#5db876"/>
    </linearGradient>
    <!-- ניצוץ אנרגיה -->
    <radialGradient id="sparkCore" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="70%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#f57c00" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- סקוירקל -->
  <rect width="512" height="512" rx="118" fill="url(#bg)"/>
  <rect width="512" height="512" rx="118" fill="url(#bloom)"/>
  <rect width="512" height="512" rx="118" fill="url(#floor)"/>

  <!-- טבעת זוהר עדינה -->
  <ellipse
    cx="256"
    cy="268"
    rx="172"
    ry="164"
    fill="none"
    stroke="#ffffff"
    stroke-opacity="0.12"
    stroke-width="6"
  />

  <!-- עלה מודרני (סימטרי) -->
  <path
    fill="url(#leaf)"
    filter="url(#softGlow)"
    d="M256 104
       C 166 138 122 208 122 288
       C 122 348 168 398 256 432
       C 344 398 390 348 390 288
       C 390 208 346 138 256 104 Z"
  />
  <!-- הברקה עלה -->
  <path
    fill="#ffffff"
    fill-opacity="0.32"
    d="M228 168 C256 142 292 148 312 176 C276 182 244 198 224 232 C210 206 208 188 228 168 Z"
  />
  <!-- עורק -->
  <path
    d="M256 182 v148"
    stroke="#063822"
    stroke-opacity="0.18"
    stroke-width="12"
    stroke-linecap="round"
  />

  <!-- ניצוץ קלוריות -->
  <circle cx="256" cy="138" r="22" fill="url(#sparkCore)" opacity="0.95"/>

  <!-- נקודות חיים -->
  <circle cx="118" cy="156" r="10" fill="#fff" fill-opacity="0.5"/>
  <circle cx="398" cy="178" r="8" fill="#c8f5d8" fill-opacity="0.85"/>
  <circle cx="384" cy="368" r="7" fill="#fff" fill-opacity="0.35"/>
</svg>
